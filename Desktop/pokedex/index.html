<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pokédex</title>

  <!--Fuente-->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!--HEADER-->
  <header>

    <!-- Logo -->
    <span class="logo">Poké<span>dex</span></span>

    <!-- Botones del lado derecho del header -->
    <div class="header-right">

      <!-- Botón para ver todos los Pokémon -->
      <button class="btn-nav active" id="btn-todos">Todos</button>

      <!-- Botón para ver favoritos -->
      <button class="btn-nav" id="btn-favoritos">⭐ Favoritos (0)</button>

    </div>
  </header>

  <section class="controls">

    <!-- Buscador por nombre o id -->
    <input
      type="search"
      id="input-busqueda"
      placeholder="Nombre o número… ej. pikachu, 25"
    />

    <!-- Filtro por tipo -->
    <select id="select-tipo">
      <option value="">Todos los tipos</option>
    </select>

    <!-- Ordenamiento -->
    <!-- id="select-orden" filtros.js lo lee -->
    <select id="select-orden">
      <option value="id-asc">Nº ↑</option>
      <option value="id-desc">Nº ↓</option>
      <option value="name-asc">A → Z</option>
      <option value="name-desc">Z → A</option>
    </select>

    <!-- Botón buscar -->
    <button class="btn-apply" id="btn-buscar">Buscar</button>

  </section>


  <!-- cuántos Pokémon hay -->
  <div class="info-bar">
    <p>Usa el buscador o carga más Pokémon</p>
  </div>

  <main class="container">
    <div class="grid" id="grid">
      <!-- Las cartas se generan desde render.js -->
    </div>

    <!-- Botón cargar más -->
    <div class="load-more">
      <button class="btn-more" id="btn-cargar-mas" hidden>
        Cargar más →
      </button>
    </div>
  </main>

  <!--FOOTER-->
  <footer>
    datos desde <a href="https://pokeapi.co" target="_blank">pokeapi.co</a>
  </footer>

  <script src="app/config.js"></script>
  <script src="app/api.js"></script>
  <script src="app/render.js"></script>
  <script src="app/favoritos.js"></script>
  <script src="app/filtros.js"></script>
  <script src="app/main.js"></script>

</body>
</html>
